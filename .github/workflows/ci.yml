name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --ignore E402,F403,F401,E501

      - name: Check for bare except: pass (security anti-pattern)
        run: |
          python -c "
import sys, os, re

failed = 0
# Match 'except:' or 'except Exception:' or 'except BaseException:' on its own line
# followed by 'pass' on the next line (the anti-pattern we ban)
except_re = re.compile(r'^\s*except(\s+(Exception|BaseException)|\s*)?:\s*$')
pass_re = re.compile(r'^\s*pass\s*$')

dirs = ['src', 'api']
files = ['api.py']

for d in dirs:
    if not os.path.isdir(d):
        continue
    for root, _, filenames in os.walk(d):
        for f in filenames:
            if not f.endswith('.py'):
                continue
            path = os.path.join(root, f)
            with open(path, encoding='utf-8') as fh:
                lines = fh.readlines()
            for i, line in enumerate(lines):
                if except_re.match(line):
                    if i + 1 < len(lines) and pass_re.match(lines[i + 1]):
                        print(f'BARE EXCEPT FOUND: {path}:{i+1}: "{line.strip()}" followed by "{lines[i+1].strip()}"')
                        failed = 1

for f in files:
    if os.path.isfile(f):
        path = f
        with open(path, encoding='utf-8') as fh:
            lines = fh.readlines()
        for i, line in enumerate(lines):
            if except_re.match(line):
                if i + 1 < len(lines) and pass_re.match(lines[i + 1]):
                    print(f'BARE EXCEPT FOUND: {path}:{i+1}: "{line.strip()}" followed by "{lines[i+1].strip()}"')
                    failed = 1

if failed:
    print('FAIL: bare except:pass anti-patterns found (should log exception, not silently swallow)')
    sys.exit(1)
else:
    print('  ✓ No bare except:pass found')
"
        shell: bash

      - name: Check for password field in API response models
        run: |
          python -m pytest tests/test_password_leak.py -q --tb=line
        shell: bash

      - name: Test with pytest
        run: |
          python -m pytest tests/ -v --tb=short --cov --cov-report=term --cov-fail-under=26
        env:
          UNION_BANK_TESTING: "1"
          JWT_SECRET: "ci-test-secret"
          FLASK_SECRET_KEY: "ci-test-flask-secret"

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker compose build api

      - name: Start services
        run: |
          docker compose up -d api

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to be ready..."
          timeout 30 sh -c 'until curl -s http://localhost:8000/api/health | grep -q "healthy"; do sleep 2; done' || echo "API health check timed out"

      - name: Run tests in Docker
        run: |
          docker compose run --rm --no-deps api \
            sh -c "UNION_BANK_TESTING=1 JWT_SECRET=ci-test-secret FLASK_SECRET_KEY=ci-test-flask-secret python -m pytest tests/ -v --tb=short --cov --cov-report=term"

      - name: Check Docker container logs
        if: always()
        run: |
          docker compose logs --tail=20 api 2>/dev/null || true

      - name: Stop services
        if: always()
        run: docker compose down --volumes --remove-orphans

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links in docs
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config /dev/null
            --no-progress
            --exclude 'https?://localhost'
            --exclude 'https?://127\\.0\\.0\\.1'
            --exclude 'https?://.*shields\\.io'
            --exclude 'https?://.*example\\.com'
            --exclude 'https?://.*test\\.org'
            --exclude 'https?://.*\\{.*\\}.*'
            '**/*.md'
        continue-on-error: true
