name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Test with pytest
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          UNION_BANK_TESTING: "1"
          JWT_SECRET: "ci-test-secret"
          FLASK_SECRET_KEY: "ci-test-flask-secret"

      - name: Check coverage
        run: |
          python -m pytest tests/ --cov --cov-report=term --cov-fail-under=26
        env:
          UNION_BANK_TESTING: "1"
          JWT_SECRET: "ci-test-secret"
          FLASK_SECRET_KEY: "ci-test-flask-secret"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose build

      - name: Start services
        run: |
          docker compose up -d redis
          docker compose up -d web
          docker compose up -d api

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for web to be ready..."
          timeout 60 sh -c 'until curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ | grep -q "200\|302"; do sleep 2; done' || echo "Web health check timed out"
          echo "Waiting for API to be ready..."
          timeout 30 sh -c 'until curl -s http://localhost:8000/health | grep -q "healthy"; do sleep 2; done' || echo "API health check timed out"

      - name: Run tests inside Docker container
        run: |
          docker compose run --rm --no-deps web \
            sh -c "UNION_BANK_TESTING=1 JWT_SECRET=ci-test-secret FLASK_SECRET_KEY=ci-test-flask-secret python -m pytest tests/ -v --tb=short --cov --cov-report=term"

      - name: Check Docker container logs
        if: always()
        run: |
          docker compose logs --tail=20 web api 2>/dev/null || true

      - name: Stop services
        if: always()
        run: docker compose down --volumes --remove-orphans

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links in docs
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config /dev/null
            --no-progress
            --exclude 'https?://localhost'
            --exclude 'https?://127\.0\.0\.1'
            --exclude 'https?://.*shields\.io'
            --exclude 'https?://.*example\.com'
            --exclude 'https?://.*test\.org'
            --exclude 'https?://.*yourusername.*'
            --exclude 'https?://.*your-username.*'
            --exclude 'https?://.*static\.streamlit\.io'
            --exclude 'https?://.*\{.*\}.*'
            '**/*.md'
        continue-on-error: true
