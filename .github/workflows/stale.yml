# Stale Issues & PRs
#
# Automatically marks issues and pull requests as stale after a period of
# inactivity, and closes them if no further activity occurs.
#
# See: https://github.com/actions/stale

name: "Stale issues & PRs"

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 7 days if no further
            activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 7 days if no
            further activity occurs.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,discussion,help wanted
          exempt-pr-labels: pinned,security,dependabot
          repo-token: ${{ secrets.GITHUB_TOKEN }}
