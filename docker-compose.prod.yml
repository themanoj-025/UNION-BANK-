# ═══════════════════════════════════════════════════════════════════════════════
#  Docker Compose — Production Override
# ═══════════════════════════════════════════════════════════════════════════════
#  Hardens the default docker-compose.yml for production deployment.
#  Also adds Prometheus + Grafana for observability.
#
#  Apply with:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  This override:
#    - Hides PostgreSQL and Redis ports from host
#    - Adds resource limits (CPU/memory)
#    - Adds Prometheus metrics scraping
#    - Adds Grafana dashboard with pre-configured datasource
# ═══════════════════════════════════════════════════════════════════════════════

services:

  api:
    # Hide internal ports — only the API port is exposed
    ports:
      - "8000:8000"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  postgres:
    # Don't expose PostgreSQL port in production
    ports: []
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

  redis:
    # Don't expose Redis port in production
    ports: []
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ── Prometheus Metrics Scraper ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: union-bank-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Grafana Dashboard ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: union-bank-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M


# ── Additional Persistent Volumes ───────────────────────────────────────────
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
