# ═══════════════════════════════════════════════════════════════════════════════
#  Kubernetes Deployment — Union Bank API
# ═══════════════════════════════════════════════════════════════════════════════
#  Reference manifests for a portfolio / production-readiness artifact.
#  Not actively deployed — document how they'd be used in README.
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: union-bank-api
  namespace: default
  labels:
    app: union-bank
    tier: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: union-bank
      tier: api
  template:
    metadata:
      labels:
        app: union-bank
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      imagePullSecrets: []
      containers:
        - name: api
          image: union-bank/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: ENV
              value: "production"
            - name: UNION_BANK_TESTING
              value: "0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: union-bank-secrets
                  key: jwt-secret
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: union-bank-secrets
                  key: jwt-private-key
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: union-bank-secrets
                  key: jwt-public-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: union-bank-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: union-bank-secrets
                  key: redis-url
            - name: CORS_ALLOWED_ORIGINS
              value: "https://union-bank.example.com"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
