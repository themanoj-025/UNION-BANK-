[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "scripts/*",
    "data/*",
    "migrations/*",
    "**/__init__.py",
]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 27  # Minimum coverage — CLI/web layers tested via smoke/E2E in Phase 7+

exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "if settings.TESTING:",
    "raise NotImplementedError",
]
