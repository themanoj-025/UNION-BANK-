{% extends "base.html" %}
{% block title %}Change Admin Password{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px; margin: 0 auto;">
  <div class="card-header">
    <div>
      <div class="card-title">🔑 Change Admin Password</div>
      <div class="card-subtitle">Update your admin credentials</div>
    </div>
  </div>
  <form method="POST">
    <div class="form-group">
      <label for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" class="form-control"
             placeholder="Enter your current password" required autofocus>
    </div>
    <div class="form-group">
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" class="form-control"
             placeholder="Min 8 chars, upper + lower + digit" required>
      <div class="form-hint">At least 8 characters with uppercase, lowercase, and a digit.</div>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" class="form-control"
             placeholder="Re-enter your new password" required>
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-primary">Update Password</button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
