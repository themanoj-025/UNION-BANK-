{% extends "base.html" %}
{% block title %}Withdraw{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">🏧 Withdraw Money</div>
      <div class="card-subtitle">Current balance: {{ fmt_currency(acc.balance) }}</div>
    </div>
  </div>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="amount">Amount (₹)</label>
      <input type="number" id="amount" name="amount" class="form-control"
             placeholder="Enter amount to withdraw" required min="0.01" step="0.01" autofocus>
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" name="category" class="form-control">
        {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-warning">Withdraw</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
